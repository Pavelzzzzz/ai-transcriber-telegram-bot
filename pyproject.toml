[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "--strict-config",
    "--disable-warnings",
    "--cov=src",
    "--cov=utils",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov",
    "--cov-report=xml",
    "--cov-fail-under=80"
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests", 
    "slow: Slow running tests",
    "asyncio: Async tests",
    "network: Tests that require network access"
]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # Pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "SIM",   # flake8-simplify
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in argument defaults
    "E402",  # module level import not at top of file
    "F401",  # unused import
    "F811",  # redefinition of unused
    "UP042", # StrEnum inheritance
    "B904",  # raise from err
    "B007",  # unused loop variable
    "F841",  # unused variable
    "SIM108", # ternary suggestion
    "SIM105", # contextlib.suppress suggestion
    "SIM117", # combine with statements
    "B023",  # closure variable binding
]

exclude = [
    "src/",           # Legacy code with many lint errors
    "config/",        # Config files
]

[tool.ruff.lint.isort]
known-first-party = ["services", "utils"]
