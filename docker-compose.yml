version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_transcriber}
      POSTGRES_USER: ${DB_USER:-bot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  bot-service:
    build:
      context: .
      dockerfile: services/bot_service/Dockerfile
    container_name: bot-service
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CLIENT_ID=bot-service
      - DATABASE_URL=postgresql://${DB_USER:-bot}:${DB_PASSWORD:-secret}@postgres:5432/${DB_NAME:-ai_transcriber}
      - DB_NAME=${DB_NAME:-ai_transcriber}
      - DB_USER=${DB_USER:-bot}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./downloads:/app/downloads
      - ./logs:/app/logs
    networks:
      - bot-network
    restart: unless-stopped

  ocr-service:
    build:
      context: .
      dockerfile: services/ocr_service/Dockerfile
    container_name: ocr-service
    ports:
      - "8002:8002"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CLIENT_ID=ocr-service
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  transcription-service:
    build:
      context: .
      dockerfile: services/transcription_service/Dockerfile
    container_name: transcription-service
    ports:
      - "8003:8003"
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CLIENT_ID=transcription-service
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bot-network
    restart: unless-stopped

  tts-service:
    build:
      context: .
      dockerfile: services/tts_service/Dockerfile
    container_name: tts-service
    ports:
      - "8004:8004"
    environment:
      - TTS_LANGUAGE=${TTS_LANGUAGE:-ru}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CLIENT_ID=tts-service
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./downloads:/app/downloads
    networks:
      - bot-network
    restart: unless-stopped

  image-gen-service:
    build:
      context: .
      dockerfile: services/image_gen_service/Dockerfile
      args:
        GPU_TYPE: ${GPU_TYPE}
    container_name: image-gen-service
    environment:
      - SDXL_MODEL_ID=${SDXL_MODEL_ID:-stabilityai/stable-diffusion-xl-base-1.0}
      - SD15_MODEL_ID=${SD15_MODEL_ID:-runwayml/stable-diffusion-v1-5}
      - FLUX_MODEL_ID=${FLUX_MODEL_ID:-black-forest-labs/FLUX.1-dev}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-sd15}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CLIENT_ID=image-gen-service
      - DATABASE_URL=postgresql://${DB_USER:-bot}:${DB_PASSWORD:-secret}@postgres:5432/${DB_NAME:-ai_transcriber}
      - GPU_TYPE=${GPU_TYPE:-intel}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./downloads:/app/downloads
      - hf_cache:/root/.cache
    networks:
      - bot-network
    restart: unless-stopped

networks:
  bot-network:
    driver: bridge

volumes:
  postgres_data:
  hf_cache:
