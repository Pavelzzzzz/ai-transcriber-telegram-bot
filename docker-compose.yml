services:
  telegram-bot:
    build:
      context: .
    image: ai-transcriber-bot:latest
    container_name: ai-transcriber-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_USERNAMES=${ADMIN_USERNAMES}
      - WHISPER_MODEL=${WHISPER_MODEL:-tiny}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-20}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-10}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
      - ./downloads:/app/downloads
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*main.py"]
      interval: 90s
      timeout: 10s
      retries: 2
      start_period: 60s
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
